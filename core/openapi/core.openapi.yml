openapi: 3.0.3
info:
  title: Core Service API
  version: 1.0.0
servers:
  - url: http://localhost:4000
tags:
  - name: Core
paths:
  /health:
    get:
      tags: [Core]
      summary: Healthcheck
      responses:
        "200":
          description: OK
  /accounts:
    get:
      tags: [Core]
      summary: List accounts
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: clientId
          schema:
            type: string
            format: uuid
          description: Filter by client (employee/admin only)
      responses:
        "200":
          description: OK
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
    post:
      tags: [Core]
      summary: Create account (stub)
      responses:
        "201":
          description: Created
  /accounts/{id}:
    get:
      tags: [Core]
      summary: Get account
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Account not found
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
