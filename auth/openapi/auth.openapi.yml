openapi: 3.0.3
info:
  title: Auth Service (Simple Flow)
  version: 1.2.0
  description: |
    Упрощенный auth без OAuth/OIDC:
    1) В DEV используется прямой вход через POST /dev/login
    2) Для новых пользователей пароль задается через страницу Auth: /setup-password?token=...
servers:
  - url: http://localhost:4000
tags:
  - name: Auth
  - name: Technical
paths:
  /health:
    get:
      tags: [Technical]
      summary: Healthcheck
      responses:
        "200":
          description: Service alive
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
              example:
                ok: true

  /setup-password:
    get:
      tags: [Auth]
      summary: Страница первичной установки пароля
      parameters:
        - in: query
          name: token
          required: true
          schema:
            type: string
      responses:
        "200":
          description: HTML page
          content:
            text/html:
              schema:
                type: string
        "400":
          description: Token invalid or expired
          content:
            text/html:
              schema:
                type: string
    post:
      tags: [Auth]
      summary: Установка пароля по одноразовому token
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [token, password, passwordRepeat]
              properties:
                token:
                  type: string
                password:
                  type: string
                  minLength: 6
                passwordRepeat:
                  type: string
      responses:
        "200":
          description: Password set
          content:
            text/html:
              schema:
                type: string
        "400":
          description: Validation or token error
          content:
            text/html:
              schema:
                type: string

  /dev/login:
    post:
      tags: [Auth]
      summary: DEV-only direct login without redirect
      description: Доступен только если SERVER_TYPE=DEV.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Tokens issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleError"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleError"
        "403":
          description: User blocked or profile not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleError"

  /logout:
    post:
      tags: [Auth]
      summary: Logout session
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
              example:
                ok: true

  /jwks:
    get:
      tags: [Technical]
      summary: Public JWKS for backend token verification
      responses:
        "200":
          description: Public keys
          content:
            application/json:
              schema:
                type: object

  /internal/users:
    post:
      tags: [Technical]
      summary: Internal create user in auth (without password)
      parameters:
        - in: header
          name: x-internal-token
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username]
              properties:
                username:
                  type: string
      responses:
        "201":
          description: Auth user created, password setup link issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  username:
                    type: string
                  setupUrl:
                    type: string
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleError"
        "401":
          description: Invalid internal token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleError"
        "409":
          description: Username already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleError"

components:
  schemas:
    SimpleError:
      type: object
      properties:
        error:
          type: string
    PasswordSetupRequiredError:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
          enum: [password_setup_required]
        message:
          type: string
          example: сначала подтвердите пароль
        setupUrl:
          type: string
    TokenResponse:
      type: object
      properties:
        token_type:
          type: string
          example: Bearer
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
        scope:
          type: string
