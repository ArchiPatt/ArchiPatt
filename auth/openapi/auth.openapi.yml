openapi: 3.0.3
info:
  title: Auth Service (Simple Flow)
  version: 1.2.0
  description: |
    Redirect flow с authorization code:
    1) Клиент открывает GET /login?return_to=<callback>
    2) POST /login проверяет логин/пароль и редиректит на return_to?code=...
    3) Клиент обменивает code на токены через POST /token
    4) Для новых пользователей пароль задается только через страницу Auth: /setup-password?token=...
servers:
  - url: http://localhost:4000
tags:
  - name: Auth
  - name: Technical
paths:
  /health:
    get:
      tags: [Technical]
      summary: Healthcheck
      responses:
        "200":
          description: Service alive
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
              example:
                ok: true

  /login:
    get:
      tags: [Auth]
      summary: Страница входа (HTML)
      parameters:
        - in: query
          name: return_to
          required: false
          schema:
            type: string
            format: uri
      responses:
        "200":
          description: HTML login page
          content:
            text/html:
              schema:
                type: string
    post:
      tags: [Auth]
      summary: Проверка логина/пароля и redirect на return_to с code
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [username, password, return_to]
              properties:
                username:
                  type: string
                password:
                  type: string
                return_to:
                  type: string
                  format: uri
      responses:
        "302":
          description: Redirect to return_to with code
        "403":
          description: Пользователь заблокирован или требуется первичная установка пароля
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/PasswordSetupRequiredError"
                  - $ref: "#/components/schemas/SimpleError"
              examples:
                password_setup_required:
                  value:
                    error: password_setup_required
                    message: сначала подтвердите пароль
                    setupUrl: http://localhost:4000/setup-password?token=abc123
                blocked_user:
                  value:
                    error: user_blocked_or_not_found
        "400":
          description: Невалидный ввод
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleError"

  /setup-password:
    get:
      tags: [Auth]
      summary: Страница первичной установки пароля
      parameters:
        - in: query
          name: token
          required: true
          schema:
            type: string
      responses:
        "200":
          description: HTML page
          content:
            text/html:
              schema:
                type: string
        "400":
          description: Token invalid or expired
          content:
            text/html:
              schema:
                type: string
    post:
      tags: [Auth]
      summary: Установка пароля по одноразовому token
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [token, password, passwordRepeat]
              properties:
                token:
                  type: string
                password:
                  type: string
                  minLength: 6
                passwordRepeat:
                  type: string
      responses:
        "200":
          description: Password set
          content:
            text/html:
              schema:
                type: string
        "400":
          description: Validation or token error
          content:
            text/html:
              schema:
                type: string

  /token:
    post:
      tags: [Auth]
      summary: Обмен authorization_code на токены или refresh
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              oneOf:
                - $ref: "#/components/schemas/AuthCodeRequest"
                - $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200":
          description: Tokens issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          description: OAuth-like error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthError"

  /logout:
    post:
      tags: [Auth]
      summary: Logout session
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
              example:
                ok: true

  /jwks:
    get:
      tags: [Technical]
      summary: Public JWKS for backend token verification
      responses:
        "200":
          description: Public keys
          content:
            application/json:
              schema:
                type: object

  /internal/users:
    post:
      tags: [Technical]
      summary: Internal create user in auth (without password)
      parameters:
        - in: header
          name: x-internal-token
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username]
              properties:
                username:
                  type: string
      responses:
        "201":
          description: Auth user created, password setup link issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  username:
                    type: string
                  setupUrl:
                    type: string
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleError"
        "401":
          description: Invalid internal token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleError"
        "409":
          description: Username already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleError"

components:
  schemas:
    OAuthError:
      type: object
      properties:
        error:
          type: string
        error_description:
          type: string
    SimpleError:
      type: object
      properties:
        error:
          type: string
    PasswordSetupRequiredError:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
          enum: [password_setup_required]
        message:
          type: string
          example: сначала подтвердите пароль
        setupUrl:
          type: string
    RefreshTokenRequest:
      type: object
      required: [grant_type, refresh_token]
      properties:
        grant_type:
          type: string
          enum: [refresh_token]
        refresh_token:
          type: string
    AuthCodeRequest:
      type: object
      required: [grant_type, code]
      properties:
        grant_type:
          type: string
          enum: [authorization_code]
        code:
          type: string
    TokenResponse:
      type: object
      properties:
        token_type:
          type: string
          example: Bearer
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
        scope:
          type: string
